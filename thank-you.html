<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Edilmar Flores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fc;
            --bg-tertiary: #eef0f7;
            --text-primary: #0f1117;
            --text-secondary: #4a5263;
            --text-tertiary: #8892a4;
            --border-color: rgba(0, 0, 0, 0.08);
            --accent-1: #635bff;
            --accent-2: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #635bff 0%, #8b5cf6 100%);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #09090f;
            --bg-secondary: #111118;
            --bg-tertiary: #191922;
            --text-primary: #f0f1f5;
            --text-secondary: #9aa0b0;
            --text-tertiary: #5c6476;
            --border-color: rgba(255, 255, 255, 0.07);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(99, 91, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="dark"] body::before {
            background:
                radial-gradient(circle at 20% 30%, rgba(99, 91, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 520px;
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 56px 44px;
            text-align: center;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(32px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrap {
            width: 72px;
            height: 72px;
            background: var(--accent-gradient);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
            box-shadow: 0 8px 24px rgba(99, 91, 255, 0.35);
        }

        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .icon-wrap i { color: white; font-size: 30px; }

        h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 14px;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .time-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 500;
            margin-bottom: 32px;
        }

        .time-badge i { color: #10b981; font-size: 11px; }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            background: var(--accent-gradient);
            color: white;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            letter-spacing: -0.01em;
            box-shadow: 0 6px 20px rgba(99, 91, 255, 0.35);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 91, 255, 0.5);
        }

        .divider {
            margin: 36px 0 28px;
            height: 1px;
            background: var(--border-color);
        }

        .social-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }

        .social-row {
            display: flex;
            gap: 9px;
            justify-content: center;
        }

        .social-row a {
            width: 38px; height: 38px;
            border-radius: 9px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .social-row a:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            color: white;
            transform: translateY(-3px);
        }

        /* Theme toggle */
        .theme-btn {
            position: fixed;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 15px;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .theme-btn:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        .sun-i { display: block; }
        .moon-i { display: none; }
        [data-theme="dark"] .sun-i { display: none; }
        [data-theme="dark"] .moon-i { display: block; }
    </style>
</head>
<body>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
        <i class="fas fa-sun sun-i"></i>
        <i class="fas fa-moon moon-i"></i>
    </button>

    <div class="card">
        <div class="icon-wrap">
            <i class="fas fa-check"></i>
        </div>

        <h1>Message Sent!</h1>

        <p class="subtitle">
            Thanks for reaching out. I've received your message and will get back to you as soon as possible.
        </p>

        <div class="time-badge">
            <i class="fas fa-circle"></i>
            <span>Typical response within 24 hours</span>
        </div>

        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i>
            Back to Portfolio
        </a>

        <div class="divider"></div>

        <p class="social-label">Connect with me</p>
        <div class="social-row">
            <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
        </div>
    </div>

    <script>
        // Sync theme with main site
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);

        document.getElementById('themeBtn').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    </script>
</body>
</html>
